<div class="dialog-container" [class.night-mode]="isNightMode()">
  <h2 mat-dialog-title>Add Element</h2>
  
  <mat-dialog-content>
    <p>Please add the information:</p>

   
    <div class="input-with-button">
      <mat-form-field appearance="outline" >
        <mat-label>Ürün</mat-label>
        <input 
          matInput 
          [ngModel]="name()" 
          (ngModelChange)="name.set($event)" 
          (keyup.enter)="sendToAi()"
        />
      </mat-form-field>

      <button 
        mat-button 
        type="button" 
        (click)="sendToAi()" 
        class="bttn">
        {{ 'Ask AI' }}
      </button>
    </div>

    <!-- 2. ID -->
    <mat-form-field appearance="outline" >
      <mat-label>ID</mat-label>
      <input 
        matInput 
        [ngModel]="id()" 
        (ngModelChange)="id.set($event)" 
      />
    </mat-form-field>

    <!-- 3. KATEGORİ -->
    <mat-form-field appearance="outline" >
      <mat-label>Kategori</mat-label>
      <input 
        matInput 
        [ngModel]="category()" 
        (ngModelChange)="category.set($event)"
      />
    </mat-form-field>

    <!-- 4. DESCRIPTION -->
    <mat-form-field appearance="outline" >
      <mat-label>Description</mat-label>
      <input 
        matInput 
        [ngModel]="description()" 
        (ngModelChange)="description.set($event)"
      />
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button (click)="onNoClick()" class="bttn">Back</button>
    <button mat-button (click)="onSaveClick()" class="bttn">Ok</button>
  </mat-dialog-actions>
</div>
