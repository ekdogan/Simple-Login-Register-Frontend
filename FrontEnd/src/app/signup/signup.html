<app-header/>
  <form class="example-form" #SignupForm="ngForm">
  <mat-form-field class="example-full-width">
    <mat-label>Username</mat-label>
    <input matInput type="text" name="username" [(ngModel)]="username">
  </mat-form-field>

  <mat-form-field class="example-full-width">
    <mat-label>Password</mat-label>
    <input matInput [type]="hide() ? 'password' : 'text'" name="password" [(ngModel)]="password"/>
    <button
      matIconButton
      matSuffix
      (click)="clickEvent($event)"
      [attr.aria-label]="'Hide password'"
      [attr.aria-pressed]="hide()"
    >
      <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>
  <mat-form-field class="example-full-width">
    <mat-label>Email</mat-label>
    <input  matInput type="email" name="email" [(ngModel)]="email" [formControl]="emailFormControl" [errorStateMatcher]="matcher"
           placeholder="name.surname@mail.enka.com">
    @if (emailFormControl.hasError('email') && !emailFormControl.hasError('required')) {
      <mat-error>Please enter a valid email address</mat-error>
    }
    @if (emailFormControl.hasError('required')) {
      <mat-error>Email is <strong>required</strong></mat-error>
    }
  </mat-form-field>
  <mat-form-field class="example-full-width">
    <mat-label>First Name</mat-label>
    <input matInput type="text" name="FirstName" [(ngModel)]="FirstName">
  </mat-form-field>
  <mat-form-field class="example-full-width">
    <mat-label>Last Name</mat-label>
    <input matInput type="text" name="LastName" [(ngModel)]="LastName">
  </mat-form-field>
</form>  
<div class="button-container">
  <button class="example-button" (click)= "onClickSignUp()" mat-raised-button color="primary">Sign up
  </button>
  <button matButton="filled" color="primary" (click)="onClickBackToLogin()">Back to login</button>
</div>
