<app-header/>
<form class="example-form" #loginForm="ngForm">
  <mat-form-field class="example-full-width">
    <mat-label>Username</mat-label>
    <input matInput type="text" name="username" [(ngModel)]="username">
  </mat-form-field>

  <mat-form-field class="example-full-width">
    <mat-label>Password</mat-label>
    <input matInput [type]="hide() ? 'password' : 'text'" name="password" [(ngModel)]="password"/>
    <button
      matIconButton
      matSuffix
      (click)="clickEvent($event)"
      [attr.aria-label]="'Hide password'"
      [attr.aria-pressed]="hide()"
    >
      <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
    </button>
  </mat-form-field>
</form>
<div class="button-container">
  <button class="example-button" (click)= "onClick()" mat-raised-button color="primary">Log in
  </button>
  <button class="example-button" (click)= "onClickSignUp()" matButton="filled" color="accent">Sign up
  </button>
</div>
  <div class="button-container">
    <button  class="custom-success-btn" (click)= "onClickForgotPassword()" matButton >Forgot Password</button>
  </div>
