<div class="dialog-container" [class.night-mode]="isNightMode()">
  <h2 mat-dialog-title>Update Element</h2>
  <mat-dialog-content>
    <p>Please update the information:</p>
    <mat-form-field>
    <mat-label>Name</mat-label>
    <input matInput [(ngModel)]="name" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Position</mat-label>
    <input matInput [(ngModel)]="position" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Weight</mat-label>
    <input matInput [(ngModel)]="weight" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Symbol</mat-label>
    <input matInput [(ngModel)]="symbol" />
  </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button matButton (click)="onNoClick()">Back</button>
    <button matButton (click)="onSaveClick()" cdkFocusInitial>Ok</button>
  </mat-dialog-actions>
</div>
