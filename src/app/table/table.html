<div class="mat-shadow-2">
  <!--Accordion Column-->
  <table mat-table [dataSource]="dataSource" >
    <ng-container matColumnDef="accordion">
      <th mat-header-cell *matHeaderCellDef>Items</th>
      <td mat-cell *matCellDef="let element">
        <mat-accordion>
          <mat-expansion-panel [expanded]="panelOpenState()">
            <mat-expansion-panel-header>
              <mat-panel-title>
                {{element.name}}
              </mat-panel-title>
            </mat-expansion-panel-header>
            <p>Position: {{element.position}}</p>
            <p>Weight: {{element.weight}}</p>
            <p>Symbol: {{element.symbol}}</p>
          </mat-expansion-panel>
        </mat-accordion>
      </td>
    </ng-container>
    <!-- Adjust Column -->
    <ng-container matColumnDef="adjust">
  <th mat-header-cell *matHeaderCellDef></th>
  <td mat-cell *matCellDef="let element">
    <a matButton class="mat-button" (click)="onClickAdjustButton(element)"><mat-icon>edit</mat-icon></a>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

<mat-divider width= 5px/>
  <mat-paginator [pageSizeOptions]="[5, 10, 15, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
</div>
