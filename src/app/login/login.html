<form class="example-form" #loginForm="ngForm">
  <mat-form-field class="example-full-width">
    <mat-label>Username</mat-label>
    <input matInput type="text" name="username" [(ngModel)]="username">
  </mat-form-field>

  <mat-form-field class="example-full-width">
    <mat-label>Password</mat-label>
    <input matInput type="password" name="password" [(ngModel)]="password">
  </mat-form-field>
</form>
<div class="space-y-4 max-w-xs mx-auto">
            <p-inputgroup>
                <p-inputgroup-addon>
                    <svg data-p-icon="user" />
                </p-inputgroup-addon>
                <input pInputText [(ngModel)]="text1" placeholder="Username" />
            </p-inputgroup>
            <p-inputgroup>
                <p-inputgroup-addon>https://</p-inputgroup-addon>
                <input pInputText [(ngModel)]="text2" placeholder="website" />
                <p-inputgroup-addon>.com</p-inputgroup-addon>
            </p-inputgroup>
        </div>
<div class="button-container">
  <button class="example-button" (click)= "onClick()" mat-raised-button color="primary">Log in
  </button>
</div>
